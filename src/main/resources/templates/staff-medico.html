<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Staff Médico - Clínica Socorro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1 class="mb-4">Nuestro Staff Médico</h1>
    
    <div class="row">
        <div class="col-md-4" th:each="u : ${medicos}">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${u.persona.nombres + ' ' + u.persona.apellidos}">Nombre del Médico</h5>
                    <p class="card-text">
                        <strong>Correo:</strong> <span th:text="${u.persona.correo}">correo@ejemplo.com</span><br>
                        <strong>Especialidad:</strong> <span class="badge bg-primary">Médico General</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/}" class="btn btn-secondary">Volver al Inicio</a>
</body>
</html>
