<html>
    <head>
        <title>Contacto - Clínica María del Socorro</title>
        <link rel="stylesheet" th:href="@{/css/estilos_contacto.css}">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>

    <div class="main-container">
        <h1 class="titulo-pagina">CONTACTO</h1>

        <div class="contacto-wrapper">
            
            <div class="info-container">
                <h2>Encuéntranos</h2>
                <div class="dato-contacto">
                    <h3>Dirección</h3>
                    <p>📍 Torre de Consultorios: Calle Cerro de Pasco Mz M Lt 10B.</p>
                    <p>📍 Torre de Triaje y Especialidades: Calle de Pasco Mz M Lt 11.</p>
                </div>
                <div class="dato-contacto">
                    <h3>Teléfono</h3>
                    <p>📞 998 220 079</p>
                </div>
                <div class="mapa-box">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3901.8157774169723!2d-76.9196969!3d-12.0561845!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105c7075727b13f%3A0x6b9f3900994191!2sCl%C3%ADnica%20Maria%20del%20Socorro!5e0!3m2!1ses-419!2spe!4v1715480000000" 
                    width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>

            <div class="form-container">
                <h3>Contacta con un asesor</h3>
                <form>
                    <input type="text" placeholder="Nombre Completo">
                    <input type="text" placeholder="Celular">
                    <input type="email" placeholder="Correo Electrónico">
                    <select>
                        <option disabled selected>Tipo de Consulta</option>
                        <option>Cita Médica</option>
                        <option>Exámenes</option>
                        <option>Otros</option>
                    </select>
                    <textarea placeholder="Mensaje"></textarea>
                    <button type="button" class="btn-enviar">Enviar</button>
                </form>
            </div>

        </div> <button class="btn-volver">Volver al Inicio</button>
    </div>

</body>
</html>
